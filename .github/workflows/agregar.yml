name: Agregador de pesquisas

on:
  schedule:
    - cron: '0 12 * * *'
  push:
    paths:
      - 'data/pesquisas_manuais.csv'
      - 'data/pesos_institutos.csv'
      - 'data/config.yaml'
      - 'scrapers/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  agregar:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Monitorar TSE (atualiza historico_tse.csv + gera alerta.txt)
        run: python scrapers/monitor_tse.py
        continue-on-error: true

      - name: Rodar agregador
        run: python -m scrapers.main

      - name: Disponibilizar Excel para download
        uses: actions/upload-artifact@v4
        with:
          name: agregador-pesquisas-excel
          path: output/agregador_pesquisas.xlsx
          retention-days: 90

      - name: Commitar resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/historico_tse.csv alerta.txt \
                  output/agregador_pesquisas.xlsx \
                  data/pesquisas.db docs/index.html

          git diff --staged --quiet && exit 0

          git commit -m "atualização $(date +'%Y-%m-%d')"

          # Pegar últimas mudanças do remoto
          git fetch origin main

          # Para arquivos binários gerados, sempre usar nossa versão
          git checkout HEAD -- data/pesquisas.db output/agregador_pesquisas.xlsx 2>/dev/null || true

          # Rebase simples — se conflitar, aborta e força push
          git rebase origin/main || {
            git rebase --abort
            git push --force-with-lease origin main
            exit 0
          }

          git push origin main
