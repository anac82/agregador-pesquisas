name: Agregador de pesquisas

on:
  schedule:
    - cron: '0 12 * * *'       # 09:00 Brasília todo dia
  push:
    paths:
      - 'data/pesquisas_manuais.csv'
      - 'data/pesos_institutos.csv'
      - 'data/config.yaml'
      - 'scrapers/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  agregar:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Monitorar TSE (atualiza historico_tse.csv + gera alerta.txt)
        run: python scrapers/monitor_tse.py

      - name: Rodar agregador
        run: python -m scrapers.main

      - name: Disponibilizar Excel para download
        uses: actions/upload-artifact@v4
        with:
          name: agregador-pesquisas-excel
          path: output/agregador_pesquisas.xlsx
          retention-days: 90

      - name: Commitar resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historico_tse.csv alerta.txt \
                  output/agregador_pesquisas.xlsx \
                  data/pesquisas.db docs/index.html
          git diff --staged --quiet || git commit -m "atualização $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
