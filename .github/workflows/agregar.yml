name: Agregador de pesquisas

on:
  schedule:
    - cron: '0 12 * * *'
  push:
    paths:
      - 'data/pesquisas_manuais.csv'
      - 'data/pesos_institutos.csv'
      - 'data/config.yaml'
      - 'scrapers/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  agregar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar agregador
        run: python -m scrapers.main

      - name: Disponibilizar Excel para download
        uses: actions/upload-artifact@v4
        with:
          name: agregador-pesquisas-excel
          path: output/agregador_pesquisas.xlsx
          retention-days: 90

      - name: Commitar Excel e banco atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/agregador_pesquisas.xlsx data/pesquisas.db
          git diff --staged --quiet || git commit -m "Atualização automática $(date +%Y-%m-%d)"
          git push
