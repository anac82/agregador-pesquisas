# =============================================================================
# CONFIGURAÇÃO DO AGREGADOR DE PESQUISAS (v2)
# =============================================================================

# --- CENÁRIOS ATIVOS ---
# Cada cenário tem:
#   nome: como aparece no Excel (nome da aba)
#   turno: 1 ou 2
#   filtro_candidatos: (só pra 2º turno) lista de 2 candidatos que devem
#                      estar presentes na pesquisa
cenarios:
  - nome: "1º Turno"
    turno: 1
    filtro_candidatos: []

  - nome: "Lula vs Flávio"
    turno: 2
    filtro_candidatos: ["Lula", "Flávio"]

  - nome: "Lula vs Zema"
    turno: 2
    filtro_candidatos: ["Lula", "Zema"]

  - nome: "Flávio vs Zema"
    turno: 2
    filtro_candidatos: ["Flávio", "Zema"]

# --- PARÂMETROS DA PONDERAÇÃO ---
ponderacao:
  recencia:
    ativo: true
    half_life_dias: 30

  amostra:
    ativo: true
    amostra_referencia: 2000

  janela_dias: 180

# --- SAÍDA ---
saida:
  arquivo_excel: "output/agregador_pesquisas.xlsx"
  banco_sqlite: "data/pesquisas.db"
